<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechPulse Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0d;
  --bg2: #111318;
  --bg3: #181b22;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e9eb;
  --muted: #6b7280;
  --dim: #3d4350;

  --crypto: #7c6af7;
  --ai: #38bdf8;
  --fintech: #34d399;
  --trading: #fb923c;

  --bullish: #22c55e;
  --bearish: #ef4444;
  --neutral: #94a3b8;
  --watch: #f59e0b;

  --critical: #dc2626;
  --high: #ea580c;
  --medium: #d97706;
  --low: #65a30d;

  --high-conf: #22c55e;
  --medium-conf: #f59e0b;
  --low-conf: #6b7280;

  --serif: 'Instrument Serif', serif;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ─── GRAIN OVERLAY ─────────────────── */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:0.6;
}

/* ─── LAYOUT ────────────────────────── */
.shell { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:0 24px 80px; }

/* ─── HEADER ────────────────────────── */
header {
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  padding: 48px 0 32px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
  flex-wrap: wrap;
  gap: 16px;
}
.wordmark {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}
.headline {
  font-family: var(--serif);
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 400;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-top: 6px;
}
.headline em { font-style:italic; color: var(--ai); }
.meta {
  text-align: right;
}
.meta-ts {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
}
.meta-count {
  font-size: 28px;
  font-family: var(--serif);
  font-weight: 400;
  color: var(--text);
  display:block;
  margin-top: 4px;
}
.meta-label { font-size:11px; color: var(--muted); }

/* ─── OVERVIEW ──────────────────────── */
.overview {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--ai);
  border-radius: 10px;
  padding: 24px 28px;
  margin-bottom: 48px;
  font-size: 16px;
  line-height: 1.7;
  color: #c8cdd6;
}
.overview-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ai);
  margin-bottom: 10px;
}

/* ─── SECTION ───────────────────────── */
section { margin-bottom: 56px; }
.section-header {
  display:flex;
  align-items:center;
  gap: 10px;
  margin-bottom: 20px;
}
.section-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}
.section-line {
  flex:1;
  height:1px;
  background: var(--border);
}
.section-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
}

/* ─── GRID ──────────────────────────── */
.grid { display: grid; gap: 14px; }
.grid-2 { grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); }
.grid-3 { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

/* ─── CARDS ─────────────────────────── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 22px;
  transition: border-color 0.2s, transform 0.2s;
  position: relative;
  overflow: hidden;
}
.card:hover {
  border-color: var(--border2);
  transform: translateY(-1px);
}
.card::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
}

.card-top {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.card-title {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 400;
  line-height: 1.3;
  color: var(--text);
}
.card-body {
  font-size: 13px;
  color: #8a919e;
  line-height: 1.65;
}
.card-footer {
  display:flex;
  align-items:center;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.card-thesis {
  font-size: 13px;
  color: #9ca3af;
  margin: 8px 0 12px;
  line-height: 1.6;
  border-left: 2px solid var(--border2);
  padding-left: 12px;
}

/* ─── BADGES ────────────────────────── */
.badge {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid;
  white-space: nowrap;
}

/* signal */
.sig-bullish  { color: var(--bullish);  border-color: rgba(34,197,94,0.3);  background: rgba(34,197,94,0.07);  }
.sig-bearish  { color: var(--bearish);  border-color: rgba(239,68,68,0.3);  background: rgba(239,68,68,0.07);  }
.sig-neutral  { color: var(--neutral);  border-color: rgba(148,163,184,0.3);background: rgba(148,163,184,0.07);}
.sig-watch    { color: var(--watch);    border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.07); }

/* severity */
.sev-critical { color: var(--critical); border-color: rgba(220,38,38,0.35); background: rgba(220,38,38,0.08); }
.sev-high     { color: var(--high);     border-color: rgba(234,88,12,0.35); background: rgba(234,88,12,0.08); }
.sev-medium   { color: var(--medium);   border-color: rgba(217,119,6,0.35); background: rgba(217,119,6,0.08); }
.sev-low      { color: var(--low);      border-color: rgba(101,163,13,0.35);background: rgba(101,163,13,0.08);}

/* category */
.cat-crypto   { color: var(--crypto);  border-color: rgba(124,106,247,0.3); background: rgba(124,106,247,0.07); }
.cat-ai       { color: var(--ai);      border-color: rgba(56,189,248,0.3);  background: rgba(56,189,248,0.07);  }
.cat-fintech  { color: var(--fintech); border-color: rgba(52,211,153,0.3);  background: rgba(52,211,153,0.07);  }
.cat-trading  { color: var(--trading); border-color: rgba(251,146,60,0.3);  background: rgba(251,146,60,0.07);  }

/* confidence / timeframe */
.conf-high    { color: var(--high-conf);   border-color: rgba(34,197,94,0.25);  background: rgba(34,197,94,0.06);  }
.conf-medium  { color: var(--medium-conf); border-color: rgba(245,158,11,0.25); background: rgba(245,158,11,0.06); }
.conf-low     { color: #6b7280;            border-color: rgba(107,114,128,0.25);background: rgba(107,114,128,0.06);}
.tf-badge     { color: var(--muted); border-color: var(--border); background: transparent; }

/* ─── EVIDENCE ──────────────────────── */
.evidence {
  margin-top: 12px;
  display:flex;
  flex-direction:column;
  gap:3px;
}
.evidence-item {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--dim);
  padding-left: 12px;
  position:relative;
  line-height:1.5;
}
.evidence-item::before {
  content: '↳';
  position:absolute;
  left:0;
  color: var(--dim);
}

/* ─── MITIGATION ────────────────────── */
.mitigation {
  margin-top: 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 12px;
  color: #7a8494;
  border-left: 2px solid var(--border2);
}
.mitigation strong {
  font-weight: 500;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display:block;
  margin-bottom:4px;
}

/* ─── KEY PLAYERS ───────────────────── */
.players-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap:12px;
}
.player-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  transition: border-color 0.2s;
}
.player-card:hover { border-color: var(--border2); }
.player-name {
  font-family: var(--serif);
  font-size: 16px;
  margin-bottom: 6px;
  color: var(--text);
}
.player-move {
  font-size: 12.5px;
  color: #9ca3af;
  margin-bottom: 8px;
  line-height:1.55;
}
.player-sig {
  font-size: 12px;
  color: #636b77;
  font-style:italic;
  line-height:1.5;
}

/* ─── CONTRARIAN ────────────────────── */
.contrarian {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--trading);
  border-radius: 10px;
  padding: 24px 28px;
}
.contrarian-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--trading);
  margin-bottom: 12px;
}
.contrarian-text {
  font-family: var(--serif);
  font-size: 20px;
  font-style:italic;
  line-height:1.5;
  color: #cdd2da;
}

/* ─── EMPTY / ERROR ─────────────────── */
.empty {
  text-align:center;
  padding: 60px;
  color: var(--muted);
}
.empty-title {
  font-family: var(--serif);
  font-size: 24px;
  margin-bottom:12px;
  color: var(--text);
}
.empty-sub {
  font-size: 13px;
  color: var(--muted);
  max-width: 400px;
  margin: 0 auto;
  line-height:1.7;
}
code {
  font-family: var(--mono);
  font-size: 12px;
  background: rgba(255,255,255,0.06);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--ai);
}

/* ─── RELOAD BUTTON ─────────────────── */
.reload-btn {
  position:fixed;
  bottom:24px;
  right:24px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 10px 18px;
  border-radius: 8px;
  cursor:pointer;
  transition: all 0.2s;
  z-index:100;
}
.reload-btn:hover {
  background: var(--bg2);
  border-color: var(--ai);
  color: var(--ai);
}

/* ─── FILTER BAR ────────────────────── */
.filters {
  display:flex;
  gap:8px;
  margin-bottom: 24px;
  flex-wrap:wrap;
}
.filter-btn {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor:pointer;
  transition: all 0.15s;
}
.filter-btn:hover, .filter-btn.active {
  border-color: var(--border2);
  color: var(--text);
  background: var(--bg3);
}
.filter-btn.active { border-color: var(--ai); color: var(--ai); }
</style>
</head>
<body>
<div class="shell">
  <div id="app"></div>
</div>

<button class="reload-btn" onclick="loadData()">↻ Refresh</button>

<script>
const CAT_CLASS = {
  '🔗 Blockchain & Crypto':   'cat-crypto',
  '🤖 AI & Machine Learning': 'cat-ai',
  '💳 Fintech':               'cat-fintech',
  '📈 Trading & Investing':   'cat-trading',
};
const CAT_SHORT = {
  '🔗 Blockchain & Crypto':   'Crypto',
  '🤖 AI & Machine Learning': 'AI/ML',
  '💳 Fintech':               'Fintech',
  '📈 Trading & Investing':   'Trading',
};

function catClass(cat) { return CAT_CLASS[cat] || 'cat-ai'; }
function catShort(cat) { return CAT_SHORT[cat] || cat; }

function badge(text, cls) {
  return `<span class="badge ${cls}">${text}</span>`;
}

function evidence(list) {
  if (!list || !list.length) return '';
  return `<div class="evidence">${list.map(t => `<div class="evidence-item">${t}</div>`).join('')}</div>`;
}

function formatTs(iso) {
  try {
    return new Date(iso).toLocaleString('en-IN', {
      day:'numeric', month:'short', year:'numeric',
      hour:'2-digit', minute:'2-digit', timeZoneName:'short'
    });
  } catch { return iso; }
}

function renderTrends(items, filter) {
  const filtered = filter === 'all' ? items : items.filter(x => catShort(x.category) === filter);
  return filtered.map(t => `
    <div class="card">
      <div class="card-top">
        <div class="card-title">${t.title}</div>
        ${badge(t.signal, `sig-${t.signal}`)}
      </div>
      <div class="card-body">${t.summary}</div>
      <div class="card-footer">
        ${badge(catShort(t.category), catClass(t.category))}
      </div>
      ${evidence(t.evidence)}
    </div>
  `).join('');
}

function renderOpportunities(items, filter) {
  const filtered = filter === 'all' ? items : items.filter(x => catShort(x.category) === filter);
  return filtered.map(o => `
    <div class="card">
      <div class="card-top">
        <div class="card-title">${o.title}</div>
        ${badge(o.confidence, `conf-${o.confidence}`)}
      </div>
      <div class="card-thesis">${o.thesis}</div>
      <div class="card-footer">
        ${badge(catShort(o.category), catClass(o.category))}
        ${badge(o.type, 'tf-badge')}
        ${badge(o.timeframe, 'tf-badge')}
      </div>
      ${evidence(o.evidence)}
    </div>
  `).join('');
}

function renderRisks(items, filter) {
  const filtered = filter === 'all' ? items : items.filter(x => catShort(x.category) === filter);
  return filtered.map(r => `
    <div class="card">
      <div class="card-top">
        <div class="card-title">${r.title}</div>
        ${badge(r.severity, `sev-${r.severity}`)}
      </div>
      <div class="card-body">${r.description}</div>
      <div class="mitigation">
        <strong>Mitigation</strong>${r.mitigation}
      </div>
      <div class="card-footer">
        ${badge(catShort(r.category), catClass(r.category))}
      </div>
      ${evidence(r.evidence)}
    </div>
  `).join('');
}

function renderPlayers(items, filter) {
  const filtered = filter === 'all' ? items : items.filter(x => catShort(x.category) === filter);
  return filtered.map(p => `
    <div class="player-card">
      <div class="player-name">${p.name}</div>
      <div class="player-move">${p.move}</div>
      <div class="player-sig">${p.significance}</div>
      <div style="margin-top:10px">${badge(catShort(p.category), catClass(p.category))}</div>
    </div>
  `).join('');
}

function filterBar(section, active) {
  const cats = ['all','Crypto','AI/ML','Fintech','Trading'];
  return `<div class="filters" id="filters-${section}">
    ${cats.map(c => `<button class="filter-btn ${c===active?'active':''}" onclick="setFilter('${section}','${c}')">${c==='all'?'All':c}</button>`).join('')}
  </div>`;
}

let DATA = null;
const FILTERS = { trends:'all', opportunities:'all', risks:'all', players:'all' };

function setFilter(section, val) {
  FILTERS[section] = val;
  render(DATA);
}

function render(d) {
  if (!d) return;
  DATA = d;

  const ts = d.generated_at ? formatTs(d.generated_at) : 'Unknown';
  const count = d.article_count || '—';

  document.getElementById('app').innerHTML = `
    <header>
      <div>
        <div class="wordmark">TechPulse · Intelligence Brief</div>
        <div class="headline">Market <em>Intelligence</em><br>Report</div>
      </div>
      <div class="meta">
        <div class="meta-ts">${ts}</div>
        <span class="meta-count">${count}</span>
        <div class="meta-label">articles analysed</div>
      </div>
    </header>

    ${d.overview ? `
    <div class="overview">
      <div class="overview-label">Macro Signal</div>
      ${d.overview}
    </div>` : ''}

    <section>
      <div class="section-header">
        <div class="section-title">Market Trends</div>
        <div class="section-line"></div>
        <div class="section-count">${(d.market_trends||[]).length}</div>
      </div>
      ${filterBar('trends', FILTERS.trends)}
      <div class="grid grid-2" id="trends-grid">
        ${renderTrends(d.market_trends||[], FILTERS.trends)}
      </div>
    </section>

    <section>
      <div class="section-header">
        <div class="section-title">Opportunities</div>
        <div class="section-line"></div>
        <div class="section-count">${(d.opportunities||[]).length}</div>
      </div>
      ${filterBar('opportunities', FILTERS.opportunities)}
      <div class="grid grid-2" id="opps-grid">
        ${renderOpportunities(d.opportunities||[], FILTERS.opportunities)}
      </div>
    </section>

    <section>
      <div class="section-header">
        <div class="section-title">Risk Register</div>
        <div class="section-line"></div>
        <div class="section-count">${(d.risks||[]).length}</div>
      </div>
      ${filterBar('risks', FILTERS.risks)}
      <div class="grid grid-2" id="risks-grid">
        ${renderRisks(d.risks||[], FILTERS.risks)}
      </div>
    </section>

    <section>
      <div class="section-header">
        <div class="section-title">Key Players</div>
        <div class="section-line"></div>
        <div class="section-count">${(d.key_players||[]).length}</div>
      </div>
      ${filterBar('players', FILTERS.players)}
      <div class="players-grid" id="players-grid">
        ${renderPlayers(d.key_players||[], FILTERS.players)}
      </div>
    </section>

    ${d.contrarian_take ? `
    <section>
      <div class="section-header">
        <div class="section-title">Contrarian Take</div>
        <div class="section-line"></div>
      </div>
      <div class="contrarian">
        <div class="contrarian-label">Non-consensus signal</div>
        <div class="contrarian-text">"${d.contrarian_take}"</div>
      </div>
    </section>` : ''}
  `;
}

function showEmpty(msg) {
  document.getElementById('app').innerHTML = `
    <div class="empty">
      <div class="empty-title">No report yet</div>
      <div class="empty-sub">${msg}</div>
    </div>
  `;
}

async function loadData() {
  try {
    const res = await fetch('analysis.json?t=' + Date.now());
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    render(data);
  } catch (e) {
    showEmpty(`
      Run your bot first: <code>python bot.py</code><br><br>
      Then generate a report: <code>python analyst.py</code><br><br>
      Or send <code>/analyze</code> on Telegram, then reload this page.
    `);
  }
}

loadData();
</script>
</body>
</html>
